name: jarvis_ai
description: The world's best AI-powered Android assistant inspired by Jarvis.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.3.6
  flutter_secure_storage: ^8.0.0
  google_generative_ai: ^0.0.1
  speech_to_text: ^5.7.1
  flutter_tts: ^3.5.1
  dio: ^5.3.2
  http: ^1.1.0
  permission_handler: ^10.4.0
  isar: ^4.0.0
  isar_flutter_libs: ^5.0.0
  battery_plus: ^4.0.0
  connectivity_plus: ^4.0.0
  device_info_plus: ^9.0.2
  camera: ^0.11.0
  image_picker: ^1.1.0
  google_mlkit_text_recognition: ^0.7.0
  file_picker: ^5.2.4
  path_provider: ^2.0.15
  url_launcher: ^6.1.10
  lottie: ^2.4.0
  flutter_animate: ^4.0.0
  package_info_plus: ^3.0.6
  share_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
